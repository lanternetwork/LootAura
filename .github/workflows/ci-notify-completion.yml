# Minimal workflow: emit `ci_completed` repository_dispatch after the main `ci` workflow finishes.
# Split from ci.yml so the large CI workflow can use `contents: read` while this job alone
# receives `contents: write` (required by GitHub for repos.createDispatchEvent).
name: ci-notify-completion

on:
  workflow_run:
    workflows: [ci]
    types: [completed]

permissions:
  contents: write

jobs:
  emit-ci-completed:
    name: emit-ci-completed
    runs-on: ubuntu-latest
    steps:
      - name: Emit ci_completed repository_dispatch
        uses: actions/github-script@v7
        with:
          script: |
            const wr = context.payload.workflow_run
            if (!wr) {
              core.setFailed('Missing workflow_run payload')
              return
            }
            const branch = String(wr.head_branch || '').replace(/^refs\/heads\//, '')
            const prNumber = wr.pull_requests && wr.pull_requests[0] ? String(wr.pull_requests[0].number) : ''
            const conclusion = wr.conclusion || 'unknown'

            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              event_type: 'ci_completed',
              client_payload: {
                branch,
                pr_number: prNumber,
                run_id: wr.id,
                conclusion,
              },
            })
            core.info(`Emitted ci_completed for branch=${branch} pr=${prNumber} conclusion=${conclusion}`)
