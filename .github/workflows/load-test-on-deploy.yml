name: Load Tests on Deployment

permissions:
  contents: read

on:
  deployment_status:
    types: [created, success]

jobs:
  determine-url:
    runs-on: ubuntu-latest
    continue-on-error: true
    outputs:
      url: ${{ steps.url.outputs.url }}
    steps:
      - name: Determine target URL
        id: url
        env:
          DEPLOY_STATE: ${{ github.event.deployment_status.state || '' }}
          ENV_URL: ${{ github.event.deployment_status.environment_url || '' }}
          TARGET_URL: ${{ github.event.deployment_status.target_url || '' }}
        run: |
          # Only set URL when deployment succeeded; otherwise output empty so run-load-tests is skipped
          if [ "$DEPLOY_STATE" != "success" ]; then
            echo "::notice::Deployment state is not success (got: $DEPLOY_STATE); skipping load tests"
            echo "url=" >> $GITHUB_OUTPUT
            exit 0
          fi
          URL="$ENV_URL"
          if [ -z "$URL" ]; then
            URL="$TARGET_URL"
          fi
          if [ -z "$URL" ]; then
            echo "::notice::No deployment URL found; skipping load tests"
            echo "url=" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "url=$URL" >> $GITHUB_OUTPUT

  run-load-tests:
    uses: lanternetwork/LootAura/.github/workflows/load-test.yml@main
    if: needs.determine-url.result == 'success' && needs.determine-url.outputs.url != ''
    needs: determine-url
    continue-on-error: true
    with:
      baseURL: ${{ needs.determine-url.outputs.url }}
      scenario: all
